{% if cart.items.all %}
    <div id="modal-cart-items">
    {% for item in cart.items.all %}
        <div class="cart-item d-flex align-items-center py-2 {% if not forloop.last %}border-bottom{% endif %}" data-item-id="{{ item.id }}" style="border-color: var(--border);">
            <div class="flex-grow-1">
                <h6 class="mb-0 small">{{ item.product.name }}</h6>
                <p class="text-muted mb-0" style="font-size: 0.8rem;">{{ item.quantity }} × {{ item.product.price }} ₽</p>
            </div>
            <p class="mb-0 fw-medium me-2">{{ item.get_total_price }} ₽</p>
            <button type="button" class="btn btn-link text-danger p-0" style="font-size: 1.2rem; text-decoration: none; line-height: 1;" onclick="window.removeItemModal({{ item.id }})">✕</button>
        </div>
    {% endfor %}
    </div>
    
    <div class="d-flex justify-content-between align-items-center pt-3 mt-3" style="border-top: 1px solid var(--border);">
        <span class="fw-medium">Итого:</span>
        <span class="fw-bold" id="modal-cart-total">{{ cart.get_total_price }} ₽</span>
    </div>
{% else %}
    <div class="text-center py-4">
        <p class="text-muted mb-0">Корзина пуста</p>
    </div>
{% endif %}
