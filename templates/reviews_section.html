<!-- Отзывы клиентов -->
<section class="section-spacing" style="background: var(--bg-secondary);">
    <div class="container" style="max-width: 1400px; padding: 0 3rem;">
        <div class="text-center mb-5">
            <h2 class="display-6 fw-bold mb-3">Отзывы клиентов</h2>
            <p class="text-muted" style="font-size: 1.1rem; max-width: 600px; margin: 0 auto;">
                Что говорят о нас наши клиенты
            </p>
        </div>
        <div class="row g-4">
            {% if reviews %}
                {% for review in reviews %}
                <div class="col-md-4">
                    <div class="card h-100" style="border: 1px solid var(--border); border-radius: 16px; padding: 2rem;">
                        <div class="mb-3">
                            {% for i in "12345" %}
                                {% if forloop.counter <= review.rating %}
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#ffc107" viewBox="0 0 16 16">
                                    <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
                                </svg>
                                {% endif %}
                            {% endfor %}
                        </div>
                        <p class="mb-3" style="line-height: 1.7;">{{ review.comment }}</p>
                        <div class="mt-auto">
                            <p class="fw-bold mb-0">{{ review.user.username }}</p>
                            <p class="text-muted small mb-0">Клиент</p>
                        </div>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="col-12 text-center">
                    <p class="text-muted">Пока нет отзывов</p>
                </div>
            {% endif %}
        </div>
    </div>
</section>
